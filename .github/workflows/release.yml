name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            suffix: windows-x86_64
          - os: ubuntu-22.04
            suffix: linux-x86_64
          - os: macos-latest
            suffix: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf qor08b-${{ matrix.suffix }}.tar.gz -C target/release qor08b convert

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target\release\qor08b.exe,target\release\convert.exe -DestinationPath qor08b-${{ matrix.suffix }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: qor08b-${{ matrix.suffix }}
          path: |
            *.tar.gz
            *.zip

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.zip
            *.tar.gz
